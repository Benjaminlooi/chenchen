name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact-name: release-windows
            args: ''
            rust-targets: ''
            bundle-globs: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*setup.exe
          - platform: ubuntu-22.04
            artifact-name: release-linux
            args: ''
            rust-targets: ''
            bundle-globs: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: macos-latest
            artifact-name: release-macos
            args: ''
            rust-targets: ''
            bundle-globs: |
              src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build ${{ matrix.args }}

      - name: Verify bundle outputs
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=()
          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            for file in $pattern; do
              files+=("$file")
            done
          done <<'EOF'
          ${{ matrix.bundle-globs }}
          EOF

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No bundle outputs found for ${{ matrix.platform }}" >&2
            echo "Expected patterns:" >&2
            cat <<'EOF' >&2
          ${{ matrix.bundle-globs }}
          EOF
            exit 1
          fi

          printf '%s\n' "${files[@]}" > release-files.txt
          echo "Found bundle outputs:"
          cat release-files.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.bundle-globs }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          msi_assets=(release-assets/release-windows/**/*.msi)
          exe_assets=(release-assets/release-windows/**/*setup.exe)
          deb_assets=(release-assets/release-linux/**/*.deb)
          rpm_assets=(release-assets/release-linux/**/*.rpm)
          appimage_assets=(release-assets/release-linux/**/*.AppImage)
          macos_dmg=(release-assets/release-macos/**/*.dmg)
          mapfile -d '' all_assets < <(find release-assets -type f -print0 | sort -z)

          if [[ ${#msi_assets[@]} -lt 1 ]]; then
            echo "Missing Windows .msi release asset." >&2
            find release-assets -maxdepth 3 -type f -print >&2
            exit 1
          fi

          if [[ ${#exe_assets[@]} -lt 1 ]]; then
            echo "Missing Windows setup .exe release asset." >&2
            find release-assets -maxdepth 3 -type f -print >&2
            exit 1
          fi

          if [[ ${#deb_assets[@]} -lt 1 ]]; then
            echo "Missing Linux .deb release asset." >&2
            find release-assets -maxdepth 3 -type f -print >&2
            exit 1
          fi

          if [[ ${#rpm_assets[@]} -lt 1 ]]; then
            echo "Missing Linux .rpm release asset." >&2
            find release-assets -maxdepth 3 -type f -print >&2
            exit 1
          fi

          if [[ ${#appimage_assets[@]} -lt 1 ]]; then
            echo "Missing Linux .AppImage release asset." >&2
            find release-assets -maxdepth 3 -type f -print >&2
            exit 1
          fi

          if [[ ${#macos_dmg[@]} -lt 1 ]]; then
            echo "Missing macOS .dmg release asset." >&2
            find release-assets -maxdepth 3 -type f -print >&2
            exit 1
          fi

          if [[ ${#all_assets[@]} -eq 0 ]]; then
            echo "No release assets downloaded." >&2
            exit 1
          fi

          echo "Release assets ready:"
          find release-assets -type f -print | sort

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -d '' release_assets < <(find release-assets -type f -print0 | sort -z)

          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "ChenChen ${{ github.ref_name }}" \
            --notes-file - \
            "${release_assets[@]}" <<'EOF'
          See the assets below to download the app for your platform.

          ## What's Changed
          - See the [changelog](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details

          ## Installation
          - **Windows**: Download and run the `.msi` or `.exe` installer
          - **Linux**: Download the `.AppImage` and make it executable
          - **macOS**: Download the unsigned `.dmg`. macOS Gatekeeper may warn because this build is not signed or notarized.
          EOF
